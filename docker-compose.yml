services:
  backend:
    build: ./backend
    container_name: forgivingcloak-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - app-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: ./backend
    container_name: forgivingcloak-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    volumes:
      - app-data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: forgivingcloak-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: forgivingcloak-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  app-data:
  redis-data:
